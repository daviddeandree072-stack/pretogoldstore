<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Vista Celular · Preto Store</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    background:#1b1a18;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:32px 24px;
    font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;
  }
  .stage{
    display:flex;flex-direction:column;align-items:center;gap:22px;
  }
  .label{
    color:#B68D40;font-size:10px;letter-spacing:0.36em;text-transform:uppercase;
    font-weight:500;
  }
  .phone{
    width:390px;height:844px;
    background:#0a0a0a;
    border-radius:52px;
    padding:11px;
    box-shadow:
      0 60px 120px rgba(0,0,0,0.55),
      0 20px 40px rgba(0,0,0,0.35),
      inset 0 0 0 1.5px #2a2826;
    position:relative;
    flex-shrink:0;
  }
  .phone::before{
    content:'';
    position:absolute;
    top:20px;left:50%;transform:translateX(-50%);
    width:120px;height:32px;
    background:#000;
    border-radius:20px;
    z-index:5;
    pointer-events:none;
  }
  .screen{
    width:100%;height:100%;
    border-radius:42px;
    overflow:hidden;
    background:#F5F5F0;
    position:relative;
  }
  iframe{
    width:100%;height:100%;border:0;display:block;
  }
  .tips{
    color:rgba(255,255,255,0.45);
    font-size:10px;letter-spacing:0.24em;text-transform:uppercase;
    text-align:center;
    max-width:380px;
    line-height:1.9;
  }
  .tips b{color:#B68D40;font-weight:500;letter-spacing:0.2em;}
  @media (max-width:480px){
    body{padding:0;background:#F5F5F0;}
    .phone{width:100vw;height:100vh;border-radius:0;padding:0;box-shadow:none;}
    .phone::before{display:none;}
    .screen{border-radius:0;}
    .label,.tips{display:none;}
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="label">Vista Mobile · iPhone</div>
    <div class="phone">
      <div class="screen">
        <iframe src="index.html" title="Preto Store" loading="eager"></iframe>
      </div>
    </div>
    <div class="tips">
      Agregue una pieza · abra el chat con <b>P</b>
    </div>
  </div>
</body>
</html>
